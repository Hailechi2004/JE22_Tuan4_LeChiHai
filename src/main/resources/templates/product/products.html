<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Product List')}">
</head>
<body>
<nav th:replace="~{_layout :: navbar}"></nav>

<div class="container body-content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold" style="color: #667eea;">
            <i class="fas fa-box-open me-2"></i>Product List
        </h2>
        <a th:href="@{/products/create}" class="btn btn-primary btn-lg">
            <i class="fas fa-plus me-2"></i>Create New Product
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-striped table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th scope="col" style="width: 60px;">#</th>
                        <th scope="col">Name</th>
                        <th scope="col" style="width: 120px;">Price</th>
                        <th scope="col" style="width: 170px;">Image</th>
                        <th scope="col">Category Name</th>
                        <th scope="col" style="width: 180px;" class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${listProduct}">
                        <th scope="row" th:text="${product.id}"></th>
                        <td th:text="${product.name}"></td>
                        <td th:text="${product.price}"></td>
                        <td>
                            <img height="120" width="150"
                                 th:src="@{/images/} + ${product.image}"
                                 alt="Product Image"
                                 class="rounded shadow-sm"
                                 style="object-fit: cover;">
                        </td>
                        <td th:text="${product.category?.name ?: ''}"></td>
                        <td class="text-center">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}"
                               class="btn btn-secondary btn-sm me-1">
                                <i class="fas fa-edit me-1"></i>Edit
                            </a>
                            <form th:action="@{/products/delete/{id}(id=${product.id})}"
                                  method="post" style="display:inline;"
                                  onsubmit="return confirm('Bạn có chắc muốn xóa sản phẩm này?');">
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="fas fa-trash me-1"></i>Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listProduct)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-2x mb-2 d-block"></i>
                            No products found. Click "Create New Product" to add one.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<footer th:replace="~{_layout :: footer}"></footer>
</body>
</html>
