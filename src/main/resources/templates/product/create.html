<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{_layout :: head('Create Product')}">
</head>
<body>
<nav th:replace="~{_layout :: navbar}"></nav>

<div class="container body-content">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card">
                <div class="card-header text-white text-center py-3"
                     style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px 12px 0 0;">
                    <h3 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Create Product</h3>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/products/create}" th:object="${product}"
                          method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Name</label>
                            <input class="form-control" type="text" th:field="*{name}"
                                   id="name" placeholder="Product Name">
                            <div class="alert alert-warning mt-2 py-1 px-2"
                                 th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label fw-semibold">Price:</label>
                            <input class="form-control" type="number" th:field="*{price}"
                                   id="price" placeholder="Price">
                            <div class="alert alert-warning mt-2 py-1 px-2"
                                 th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="image" class="form-label fw-semibold">Image:</label>
                            <input class="form-control" type="file" id="image" name="imageProduct"
                                   accept="image/png,image/jpeg">
                            <div class="alert alert-warning mt-2 py-1 px-2"
                                 th:if="${#fields.hasErrors('image')}" th:errors="*{image}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="category" class="form-label fw-semibold">Category:</label>
                            <select th:field="*{category.id}" class="form-control" id="category">
                                <option th:each="category : ${categories}"
                                        th:value="${category.id}" th:text="${category.name}"></option>
                            </select>
                            <div class="alert alert-warning mt-2 py-1 px-2"
                                 th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                        </div>

                        <div class="d-grid">
                            <input type="submit" class="btn btn-success btn-lg" value="Add Product">
                        </div>
                    </form>
                </div>
            </div>

            <div class="text-center mt-3">
                <a th:href="@{/products}" class="text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i>Back to list
                </a>
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{_layout :: footer}"></footer>
</body>
</html>
